name: Test MLflow Tracing

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: read
  checks: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event.issue.pull_request
      && contains(github.event.comment.body, '@test-agent preflight')

    steps:
      - name: Get PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefOid,headRefName)
          echo "sha=$(echo "$PR_DATA" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
          echo "ref=$(echo "$PR_DATA" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}
          fetch-depth: 0

      - name: Verify MLflow connection
        continue-on-error: true
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_TOKEN: ${{ secrets.MLFLOW_TRACKING_TOKEN }}
          MLFLOW_WORKSPACE: ${{ secrets.MLFLOW_WORKSPACE }}
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $MLFLOW_TRACKING_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Mlflow-Workspace: $MLFLOW_WORKSPACE" \
            -d '{"max_results": 1}' \
            "$MLFLOW_TRACKING_URI/api/2.0/mlflow/experiments/search")
          echo "MLflow API: HTTP $CODE"

      - name: Set up Python and MLflow
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MLflow
        run: pip install "mlflow[genai]>=3.5"

      - name: Configure MLflow tracing
        run: |
          mkdir -p .claude
          printf '.claude/settings.local.json\n' >> .git/info/exclude
          cat > .claude/settings.local.json << 'SETTINGS'
          {
            "env": { "MLFLOW_CLAUDE_TRACING_ENABLED": "true" },
            "hooks": {
              "Stop": [{
                "matcher": "",
                "hooks": [{ "type": "command", "command": "which mlflow >/dev/null 2>&1 && mlflow autolog claude stop-hook || true" }]
              }],
              "StopFailure": [{
                "matcher": "",
                "hooks": [{ "type": "command", "command": "which mlflow >/dev/null 2>&1 && mlflow autolog claude stop-hook || true" }]
              }]
            }
          }
          SETTINGS

      - name: Preflight check
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          use_vertex: "false"
          use_bedrock: "false"
          claude_args: "--max-turns 120 --model claude-sonnet-4-6 --permission-mode acceptEdits"
          show_full_output: "true"
          prompt: "/preflight ${{ github.event.issue.number }} --skip-review coderabbit --ci"
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_EXPERIMENT_NAME: ${{ secrets.MLFLOW_EXPERIMENT_NAME }}
          MLFLOW_TRACKING_TOKEN: ${{ secrets.MLFLOW_TRACKING_TOKEN }}
          MLFLOW_WORKSPACE: ${{ secrets.MLFLOW_WORKSPACE }}
          MLFLOW_ENABLE_WORKSPACES: "true"
          MLFLOW_CLAUDE_TRACING_ENABLED: "true"

      # ── Post-Claude: format and post results ──
      - name: Format results
        if: always()
        run: |
          echo "=== Searching for results file ==="
          find / -name "preflight-results.json" 2>/dev/null || true
          echo "=== Workspace contents ==="
          ls -la "${GITHUB_WORKSPACE}/" | head -20
          echo "=== /tmp contents ==="
          ls -la /tmp/ | grep preflight 2>/dev/null || echo "nothing in /tmp"

          # Check multiple possible locations
          for f in \
            "${GITHUB_WORKSPACE}/preflight-results.json" \
            "/tmp/preflight-results.json" \
            "${RUNNER_TEMP}/preflight-results.json"; do
            [ -f "$f" ] && RESULTS="$f" && break
          done

          if [ -n "${RESULTS:-}" ]; then
            echo "Results file found at $RESULTS"
            cat "$RESULTS" | jq '.verdict'
            .claude/skills/preflight/scripts/format-results.sh \
              "${{ github.repository_owner }}" \
              "$(echo '${{ github.repository }}' | cut -d/ -f2)" \
              "${{ github.event.issue.number }}" \
              "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              "$RESULTS"
          else
            echo "No results file — Claude may not have written it"
          fi

      - name: Post summary comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/preflight-comment.md ]; then
            echo "No comment file — skipping"; exit 0
          fi

          EXISTING_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            --jq '.[] | select(.body | contains("<!-- odh-preflight-agent -->")) | .id' 2>/dev/null | head -1)

          if [ -n "$EXISTING_ID" ]; then
            echo "Updating existing comment $EXISTING_ID"
            jq -Rs '{body: .}' /tmp/preflight-comment.md | \
              gh api "repos/${{ github.repository }}/issues/comments/$EXISTING_ID" --method PATCH --input - > /dev/null
          else
            echo "Creating new comment"
            gh pr comment "${{ github.event.issue.number }}" --body-file /tmp/preflight-comment.md
          fi

      - name: Post inline review
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/review.json ]; then
            echo "No review file — skipping"; exit 0
          fi
          echo "Posting inline review"
          gh api "repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}/reviews" \
            --input /tmp/review.json || echo "Inline review failed (may need app token)"

      - name: Flush MLflow traces
        if: always()
        continue-on-error: true
        run: |
          sleep 5
          mlflow autolog claude stop-hook 2>&1 || true
