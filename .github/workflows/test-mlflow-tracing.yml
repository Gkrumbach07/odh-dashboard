name: Test MLflow Tracing

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event.issue.pull_request
      && contains(github.event.comment.body, '@test-agent preflight')

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_EXPERIMENT_NAME: ${{ secrets.MLFLOW_EXPERIMENT_NAME }}
      MLFLOW_TRACKING_TOKEN: ${{ secrets.MLFLOW_TRACKING_TOKEN }}
      MLFLOW_WORKSPACE: ${{ secrets.MLFLOW_WORKSPACE }}
      MLFLOW_ENABLE_WORKSPACES: "true"
      MLFLOW_CLAUDE_TRACING_ENABLED: "true"

    steps:
      - name: Get PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefOid,headRefName)
          echo "sha=$(echo "$PR_DATA" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
          echo "ref=$(echo "$PR_DATA" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"
          if echo "$COMMENT_BODY" | grep -qi "@test-agent.*preflight.*fix"; then
            echo "fix_flag=--fix" >> "$GITHUB_OUTPUT"
          else
            echo "fix_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}
          fetch-depth: 0

      - name: Verify MLflow connection
        continue-on-error: true
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $MLFLOW_TRACKING_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Mlflow-Workspace: $MLFLOW_WORKSPACE" \
            -d '{"max_results": 1}' \
            "$MLFLOW_TRACKING_URI/api/2.0/mlflow/experiments/search")
          echo "MLflow API: HTTP $CODE"

      - name: Set up Python and MLflow
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MLflow
        run: pip install "mlflow[genai]>=3.5"

      - name: Configure MLflow tracing
        run: |
          mkdir -p ~/.claude
          cat > ~/.claude/settings.local.json << 'SETTINGS'
          {
            "env": { "MLFLOW_CLAUDE_TRACING_ENABLED": "true" },
            "hooks": {
              "Stop": [{
                "matcher": "",
                "hooks": [{ "type": "command", "command": "which mlflow >/dev/null 2>&1 && mlflow autolog claude stop-hook || true" }]
              }],
              "StopFailure": [{
                "matcher": "",
                "hooks": [{ "type": "command", "command": "which mlflow >/dev/null 2>&1 && mlflow autolog claude stop-hook || true" }]
              }]
            }
          }
          SETTINGS

      - name: Preflight check
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          use_vertex: "false"
          use_bedrock: "false"
          claude_args: >-
            --max-turns 200
            --model "claude-sonnet-4-6[1m]"
            --permission-mode acceptEdits
            --allowedTools "Bash(gh *)"
            --allowedTools "Bash(git *)"
            --allowedTools "Bash(npm *)"
            --allowedTools "Bash(npx *)"
            --allowedTools "Bash(bash *)"
          show_full_output: "true"
          prompt: "/preflight ${{ github.event.issue.number }} ${{ steps.pr.outputs.fix_flag }} --skip-review coderabbit --ci"
