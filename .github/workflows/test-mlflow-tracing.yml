name: Test MLflow Tracing

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: read
  checks: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event.issue.pull_request
      && contains(github.event.comment.body, '@test-agent preflight')

    steps:
      - name: Get PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefOid,headRefName)
          echo "sha=$(echo "$PR_DATA" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
          echo "ref=$(echo "$PR_DATA" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref }}
          fetch-depth: 0

      - name: Verify MLflow connection
        continue-on-error: true
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_TOKEN: ${{ secrets.MLFLOW_TRACKING_TOKEN }}
          MLFLOW_WORKSPACE: ${{ secrets.MLFLOW_WORKSPACE }}
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $MLFLOW_TRACKING_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Mlflow-Workspace: $MLFLOW_WORKSPACE" \
            -d '{"max_results": 1}' \
            "$MLFLOW_TRACKING_URI/api/2.0/mlflow/experiments/search")
          echo "MLflow API: HTTP $CODE"

      - name: Set up Python and MLflow
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MLflow
        run: pip install "mlflow[genai]>=3.5"

      - name: Configure MLflow tracing
        run: |
          mkdir -p .claude
          printf '.claude/settings.local.json\n' >> .git/info/exclude
          cat > .claude/settings.local.json << 'SETTINGS'
          {
            "env": { "MLFLOW_CLAUDE_TRACING_ENABLED": "true" },
            "hooks": {
              "Stop": [{
                "matcher": "",
                "hooks": [{ "type": "command", "command": "which mlflow >/dev/null 2>&1 && mlflow autolog claude stop-hook || true" }]
              }],
              "StopFailure": [{
                "matcher": "",
                "hooks": [{ "type": "command", "command": "which mlflow >/dev/null 2>&1 && mlflow autolog claude stop-hook || true" }]
              }]
            }
          }
          SETTINGS

      - name: Preflight check
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          use_vertex: "false"
          use_bedrock: "false"
          claude_args: "--max-turns 120 --model claude-sonnet-4-6 --permission-mode acceptEdits"
          show_full_output: true
          prompt: "/preflight ${{ github.event.issue.number }} --skip-review coderabbit --ci"
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_EXPERIMENT_NAME: ${{ secrets.MLFLOW_EXPERIMENT_NAME }}
          MLFLOW_TRACKING_TOKEN: ${{ secrets.MLFLOW_TRACKING_TOKEN }}
          MLFLOW_WORKSPACE: ${{ secrets.MLFLOW_WORKSPACE }}
          MLFLOW_ENABLE_WORKSPACES: "true"
          MLFLOW_CLAUDE_TRACING_ENABLED: "true"

      # ── Post-Claude: extract JSON from output, format, post ──
      - name: Extract and format results
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          LOG="${RUNNER_TEMP}/claude-execution-output.json"
          if [ ! -f "$LOG" ]; then
            echo "No execution output found"
            exit 0
          fi

          # Extract the last JSON object from Claude's text output
          # The output log contains message objects — find the last assistant text that looks like JSON
          jq -r '[.[] | select(.type == "assistant") | .message.content[]? | select(.type == "text") | .text] | last // empty' "$LOG" > /tmp/raw-output.txt 2>/dev/null

          # Try to extract JSON from the output (it might be wrapped in markdown code fences)
          sed -n '/^{/,/^}/p' /tmp/raw-output.txt > /tmp/preflight-results.json 2>/dev/null
          if ! jq empty /tmp/preflight-results.json 2>/dev/null; then
            # Try extracting from code fences
            sed -n '/```json/,/```/p' /tmp/raw-output.txt | sed '1d;$d' > /tmp/preflight-results.json 2>/dev/null
          fi

          if ! jq empty /tmp/preflight-results.json 2>/dev/null; then
            echo "Could not extract valid JSON from Claude's output"
            echo "Raw output:"
            cat /tmp/raw-output.txt | head -20
            exit 0
          fi

          echo "Results extracted:"
          jq '.verdict' /tmp/preflight-results.json

          # Format using the script
          .claude/skills/preflight/scripts/format-results.sh \
            "${{ github.repository_owner }}" \
            "$(echo '${{ github.repository }}' | cut -d/ -f2)" \
            "$PR_NUMBER" \
            "$RUN_URL"

          # Post summary comment (find existing or create new)
          EXISTING_ID=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("<!-- odh-preflight-agent -->")) | .id' 2>/dev/null | head -1)

          if [ -n "$EXISTING_ID" ]; then
            echo "Updating existing comment $EXISTING_ID"
            jq -Rs '{body: .}' /tmp/preflight-comment.md | \
              gh api "repos/${{ github.repository }}/issues/comments/$EXISTING_ID" --method PATCH --input - > /dev/null
          else
            echo "Creating new comment"
            gh pr comment "$PR_NUMBER" --body-file /tmp/preflight-comment.md
          fi

          # Post inline review if there are findings
          if [ -f /tmp/review.json ]; then
            echo "Posting inline review"
            gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
              --input /tmp/review.json || echo "Inline review failed"
          fi

      - name: Flush MLflow traces
        if: always()
        continue-on-error: true
        run: |
          sleep 5
          mlflow autolog claude stop-hook 2>&1 || true
