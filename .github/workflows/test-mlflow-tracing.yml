name: Test MLflow Tracing

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_EXPERIMENT_NAME: ${{ secrets.MLFLOW_EXPERIMENT_NAME }}
      MLFLOW_TRACKING_TOKEN: ${{ secrets.MLFLOW_TRACKING_TOKEN }}
      MLFLOW_WORKSPACE: ${{ secrets.MLFLOW_WORKSPACE }}
      MLFLOW_ENABLE_WORKSPACES: "true"
      MLFLOW_CLAUDE_TRACING_ENABLED: "true"

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          repository: opendatahub-io/odh-dashboard
          ref: refs/pull/7603/head
          fetch-depth: 0

      - name: Set up Python and MLflow
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install MLflow
        run: pip install "mlflow[genai]>=3.5"

      - name: Verify MLflow connection
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $MLFLOW_TRACKING_TOKEN" \
            -H "Content-Type: application/json" \
            -H "X-Mlflow-Workspace: $MLFLOW_WORKSPACE" \
            -d '{"max_results": 1}' \
            "$MLFLOW_TRACKING_URI/api/2.0/mlflow/experiments/search")
          echo "MLflow API: HTTP $CODE"
          if [ "$CODE" != "200" ]; then
            echo "::warning::MLflow API returned $CODE — tracing may not work"
          fi

      - name: Configure MLflow tracing
        run: |
          mkdir -p .claude
          printf '.claude/settings.local.json\n' >> .git/info/exclude
          cat > .claude/settings.local.json << 'SETTINGS'
          {
            "env": { "MLFLOW_CLAUDE_TRACING_ENABLED": "true" },
            "hooks": {
              "Stop": [{
                "matcher": "",
                "hooks": [{ "type": "command", "command": "which mlflow >/dev/null 2>&1 && mlflow autolog claude stop-hook || true" }]
              }],
              "StopFailure": [{
                "matcher": "",
                "hooks": [{ "type": "command", "command": "which mlflow >/dev/null 2>&1 && mlflow autolog claude stop-hook || true" }]
              }]
            }
          }
          SETTINGS

      - name: Preflight check (check-only mode)
        run: |
          npx @anthropic-ai/claude-code -p "Run /preflight 7603 --skip-review coderabbit to check this PR. You are in agent-check-only mode — do NOT modify files, commit, or push. Run preflight once, then post a summary PR comment via gh pr comment 7603. The comment must have a Preflight Agent Report header, verdict with mode, the results table with status emojis, an expandable Tracing section, and a footer linking to this workflow run." \
            --max-turns 50 \
            --model claude-haiku-4-5 \
            --disallowedTools "Edit,Write,NotebookEdit" || true
          echo "=== Claude exited ==="

      - name: Flush MLflow traces
        if: always()
        run: |
          mlflow autolog claude stop-hook || echo "Stop hook exit code: $?"
